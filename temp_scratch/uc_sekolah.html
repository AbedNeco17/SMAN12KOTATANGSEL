<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Website Sekolah Use Case</title>
  <style>
    body {
      background-color: #ffffff;
      margin: 0;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }
    svg {
      background-color: #ffffff;
    }
  </style>
</head>
<body>

<svg width="1200" height="1100" viewBox="0 0 1200 1100" xmlns="http://www.w3.org/2000/svg">
  <!-- Definitions for arrows -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="6" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 1 L 10 5 L 0 9" fill="none" stroke="#666666" stroke-width="1.2" />
    </marker>
  </defs>

  <!-- Outer Tab indicator -->
  <path d="M 10 15 L 70 15 L 80 30 L 10 30 Z" fill="#ffffff" stroke="#000000" stroke-width="1" />
  <text x="40" y="26" text-anchor="middle" font-size="10" font-family="Arial, sans-serif">uc RPL</text>

  <!-- System Box -->
  <rect x="220" y="40" width="760" height="1020" fill="#ffffff" stroke="#000000" stroke-width="1" />
  <text x="600" y="65" text-anchor="middle" font-size="14" font-weight="bold" font-family="Arial, sans-serif">WEBSITE SEKOLAH</text>

  <!-- Admin Actor (Left) -->
  <g transform="translate(100, 525)">
    <circle cx="0" cy="-30" r="10" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.2" />
    <line x1="0" y1="-20" x2="0" y2="15" stroke="#000000" stroke-width="1.2" />
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#000000" stroke-width="1.2" />
    <line x1="0" y1="15" x2="-12" y2="40" stroke="#000000" stroke-width="1.2" />
    <line x1="0" y1="15" x2="12" y2="40" stroke="#000000" stroke-width="1.2" />
    <text x="0" y="60" text-anchor="middle" font-size="12" font-weight="bold" font-family="Arial, sans-serif">Admin</text>
  </g>

  <!-- Pengunjung Umum Actor (Right Top) -->
  <g transform="translate(1100, 280)">
    <circle cx="0" cy="-30" r="10" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.2" />
    <line x1="0" y1="-20" x2="0" y2="15" stroke="#000000" stroke-width="1.2" />
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#000000" stroke-width="1.2" />
    <line x1="0" y1="15" x2="-12" y2="40" stroke="#000000" stroke-width="1.2" />
    <line x1="0" y1="15" x2="12" y2="40" stroke="#000000" stroke-width="1.2" />
    <text x="0" y="60" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Pengunjung Umum</text>
  </g>

  <!-- Siswa & Orang Tua Actor (Right Bottom) -->
  <g transform="translate(1100, 770)">
    <circle cx="0" cy="-30" r="10" fill="#FFF2CC" stroke="#D6B656" stroke-width="1.2" />
    <line x1="0" y1="-20" x2="0" y2="15" stroke="#000000" stroke-width="1.2" />
    <line x1="-20" y1="-10" x2="20" y2="-10" stroke="#000000" stroke-width="1.2" />
    <line x1="0" y1="15" x2="-12" y2="40" stroke="#000000" stroke-width="1.2" />
    <line x1="0" y1="15" x2="12" y2="40" stroke="#000000" stroke-width="1.2" />
    <text x="0" y="60" text-anchor="middle" font-size="11" font-weight="bold" font-family="Arial, sans-serif">Siswa &amp; Orang Tua</text>
  </g>

  <!-- ================= LEFT COLUMN USE CASES (Admin Main) ================= -->
  <!-- Mengelola Berita -->
  <g transform="translate(380, 220)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="4" text-anchor="middle" font-size="12" font-family="Arial, sans-serif">Mengelola Berita</text>
  </g>
  <!-- Mengelola Informasi Sekolah -->
  <g transform="translate(380, 340)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif">
      <tspan x="0" dy="0">Mengelola</tspan>
      <tspan x="0" dy="13">Informasi Sekolah</tspan>
    </text>
  </g>
  <!-- Mengelola Ekstrakurikuler -->
  <g transform="translate(380, 460)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif">
      <tspan x="0" dy="0">Mengelola</tspan>
      <tspan x="0" dy="13">Ekstrakurikuler</tspan>
    </text>
  </g>
  <!-- Mengelola Pengumuman -->
  <g transform="translate(380, 580)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif">
      <tspan x="0" dy="0">Mengelola</tspan>
      <tspan x="0" dy="13">Pengumuman</tspan>
    </text>
  </g>
  <!-- Mengelola Galeri -->
  <g transform="translate(380, 700)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="4" text-anchor="middle" font-size="12" font-family="Arial, sans-serif">Mengelola Galeri</text>
  </g>

  <!-- ================= RIGHT COLUMN USE CASES (Visitor & Ortu/Siswa) ================= -->
  <!-- Melihat Berita -->
  <g transform="translate(820, 220)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="4" text-anchor="middle" font-size="12" font-family="Arial, sans-serif">Melihat Berita</text>
  </g>
  <!-- Melihat Informasi Sekolah -->
  <g transform="translate(820, 340)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif">
      <tspan x="0" dy="0">Melihat</tspan>
      <tspan x="0" dy="13">Informasi Sekolah</tspan>
    </text>
  </g>
  <!-- Melihat Ekstrakurikuler -->
  <g transform="translate(820, 460)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif">
      <tspan x="0" dy="0">Melihat</tspan>
      <tspan x="0" dy="13">Ekstrakurikuler</tspan>
    </text>
  </g>
  <!-- Melihat Pengumuman -->
  <g transform="translate(820, 580)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif">
      <tspan x="0" dy="0">Melihat</tspan>
      <tspan x="0" dy="13">Pengumuman</tspan>
    </text>
  </g>
  <!-- Melihat Galeri -->
  <g transform="translate(820, 700)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="4" text-anchor="middle" font-size="12" font-family="Arial, sans-serif">Melihat Galeri</text>
  </g>

  <!-- ================= CENTER COLUMN USE CASES ================= -->
  <!-- Login -->
  <g transform="translate(600, 110)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="4" text-anchor="middle" font-size="12" font-family="Arial, sans-serif">Login</text>
  </g>
  <!-- Melihat Riwayat Poin -->
  <g transform="translate(600, 820)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif">
      <tspan x="0" dy="0">Melihat</tspan>
      <tspan x="0" dy="13">Riwayat Poin</tspan>
    </text>
  </g>
  <!-- Mencetak Riwayat Poin -->
  <g transform="translate(600, 915)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="-2" text-anchor="middle" font-size="11" font-family="Arial, sans-serif">
      <tspan x="0" dy="0">Mencetak</tspan>
      <tspan x="0" dy="13">Riwayat Poin</tspan>
    </text>
  </g>
  <!-- Logout -->
  <g transform="translate(600, 1000)">
    <ellipse cx="0" cy="0" rx="90" ry="24" fill="#DAE8FC" stroke="#6C8EBF" stroke-width="1.2" />
    <text x="0" y="4" text-anchor="middle" font-size="12" font-family="Arial, sans-serif">Logout</text>
  </g>


  <!-- ================= SOLID CONNECTORS FOR ADMIN ================= -->
  <line x1="120" y1="525" x2="290" y2="220" stroke="#000000" stroke-width="1.2" />
  <line x1="120" y1="525" x2="290" y2="340" stroke="#000000" stroke-width="1.2" />
  <line x1="120" y1="525" x2="290" y2="460" stroke="#000000" stroke-width="1.2" />
  <line x1="120" y1="525" x2="290" y2="580" stroke="#000000" stroke-width="1.2" />
  <line x1="120" y1="525" x2="290" y2="700" stroke="#000000" stroke-width="1.2" />
  <!-- Login/Logout via outer left margin (x=50 & x=70) to prevent crossing includes -->
  <path d="M 80 525 L 50 525 L 50 110 L 510 110" fill="none" stroke="#000000" stroke-width="1.2" />
  <path d="M 80 525 L 70 525 L 70 1000 L 510 1000" fill="none" stroke="#000000" stroke-width="1.2" />


  <!-- ================= SOLID CONNECTORS FOR UMUM ================= -->
  <line x1="1080" y1="280" x2="910" y2="220" stroke="#000000" stroke-width="1.2" />
  <line x1="1080" y1="280" x2="910" y2="340" stroke="#000000" stroke-width="1.2" />
  <line x1="1080" y1="280" x2="910" y2="460" stroke="#000000" stroke-width="1.2" />
  <line x1="1080" y1="280" x2="910" y2="580" stroke="#000000" stroke-width="1.2" />
  <line x1="1080" y1="280" x2="910" y2="700" stroke="#000000" stroke-width="1.2" />


  <!-- ================= SOLID CONNECTORS FOR SISWA & ORANG TUA ================= -->
  <line x1="1080" y1="770" x2="690" y2="820" stroke="#000000" stroke-width="1.2" /> <!-- to Melihat Riwayat Poin -->
  <!-- Login/Logout via outer right margin (x=1150 & x=1130) -->
  <path d="M 1120 770 L 1150 770 L 1150 110 L 690 110" fill="none" stroke="#000000" stroke-width="1.2" />
  <path d="M 1120 770 L 1130 770 L 1130 1000 L 690 1000" fill="none" stroke="#000000" stroke-width="1.2" />

  <!-- Readers via vertical bus at x=715 (No crossings with Umum's lines) -->
  <path d="M 1080 770 L 715 770 L 715 220 L 730 220" fill="none" stroke="#000000" stroke-width="1.2" />
  <path d="M 1080 770 L 715 770 L 715 340 L 730 340" fill="none" stroke="#000000" stroke-width="1.2" />
  <path d="M 1080 770 L 715 770 L 715 460 L 730 460" fill="none" stroke="#000000" stroke-width="1.2" />
  <path d="M 1080 770 L 715 770 L 715 580 L 730 580" fill="none" stroke="#000000" stroke-width="1.2" />
  <path d="M 1080 770 L 715 770 L 715 700 L 730 700" fill="none" stroke="#000000" stroke-width="1.2" />


  <!-- ================= INCLUDES (Dashed Arrows via Bus at x=495 to avoid piercing ovals) ================= -->
  <!-- Bus trunk line going up to bottom left of Login -->
  <path d="M 495 700 L 495 134 L 525 134" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none" />
  <text x="490" y="150" font-size="9" fill="#666666" font-style="italic" text-anchor="end">«include»</text>

  <!-- Connectors from the right edge of left column ovals to the bus -->
  <path d="M 470 220 L 495 220" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,4" fill="none" />
  <path d="M 470 340 L 495 340" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,4" fill="none" />
  <path d="M 470 460 L 495 460" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,4" fill="none" />
  <path d="M 470 580 L 495 580" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,4" fill="none" />
  <path d="M 470 700 L 495 700" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,4" fill="none" />

  <!-- Melihat Riwayat Poin -> Login (Straight vertical) -->
  <path d="M 600 796 L 600 134" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none" />
  <text x="605" y="450" font-size="9" fill="#666666" font-style="italic">«include»</text>


  <!-- ================= EXTENDS (Dashed Arrow) ================= -->
  <!-- Mencetak Riwayat Poin -> Melihat Riwayat Poin -->
  <path d="M 600 891 L 600 846" stroke="#666666" stroke-width="1.2" stroke-dasharray="4,4" marker-end="url(#arrow)" fill="none" />
  <text x="605" y="873" font-size="9" fill="#666666" font-style="italic">«extend»</text>

</svg>

</body>
</html>
